defaults:
  - treeformer_hpg
  - _self_

train:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_train.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images
    epochs: 40
    lr: 1e-5
    scheduler:
        params:
            # T_max > epochs intentionally: keeps LR ~midpoint of cosine
            # decay at end of training rather than reaching eta_min.
            T_max: 60
            eta_min: 1e-6

validation:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_test.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images

keypoint:
  # Start where pretrain ended; anneal gently to tighten density maps
  # toward human annotations.
  density_sigma_start: 3.0
  density_sigma_end: 1.6
  density_sigma_schedule_epochs: 20
  # Pretrain images were 1024x1024 vs 400x400 here (same GSD, smaller spatial
  # extent), so the count head needs to recalibrate downward.
  mae_weight: 0.1
  count_cls_weight: 0.1
  norm_cood: true
