# Config file for DeepForest pytorch module

# Cpu workers for data loaders
# Dataloaders
workers: 0
devices: auto
accelerator: auto
batch_size: 1

# Model Architecture
architecture: 'retinanet'
nms_thresh: 0.05
score_thresh: 0.1

# Set model name to None to initialize from scratch
model:
    name: 'weecology/deepforest-tree'
    revision: 'main'

# Trainer precision. Override to 16-mixed for faster training, 32-true for full precision.
precision:

# On CUDA, setting the matmul precision can provide speed up without affecting model performance
# Start with 'high' for initial tests.
matmul_precision: highest

# Specify a label_dict to override model settings.
# By default, this will be populated from the model
# checkpoint that is selected in model.name/revision.
# e.g. { "Tree": 0 }
label_dict:
num_classes:

# Pre-processing parameters
path_to_raster:
patch_size: 400
patch_overlap: 0.05
annotations_xml:
rgb_dir:
path_to_rgb:

log_root: ./lightning_logs

train:
    csv_file:
    root_dir:

    # Optimizer initial learning rate
    lr: 0.001
    optimizer: sgd
    weight_decay: 0.0001

    # Data augmentations for training
    # Augmentations must be a list of augmentation names, or a list
    # of dicts with augmentation names and parameters.
    # Examples:
    # augmentations:
    #   - HorizontalFlip: {p: 0.5}
    #   - Downscale: {scale_min: 0.25, scale_max: 0.75, p: 0.5}
    augmentations:
        - HorizontalFlip: {p: 0.5}
    scheduler:
        type:
        params:
            # Common parameters
            T_max: 10
            eta_min: 0.00001
            lr_lambda: "0.95 ** epoch"  # For lambdaLR and multiplicativeLR
            step_size: 30  # For stepLR
            gamma: 0.1  # For stepLR, multistepLR, and exponentialLR
            milestones: [50, 100]  # For multistepLR

            # ReduceLROnPlateau parameters (used if type is not explicitly mentioned)
            mode: "min"
            factor: 0.1
            patience: 10
            threshold: 0.0001
            threshold_mode: "rel"
            cooldown: 0
            min_lr: 0
            eps: 0.00000001

    # How many epochs to run for
    epochs: 1
    # Useful debugging flag in pytorch lightning, set to True to get a single batch of training to test settings.
    fast_dev_run: False
    # preload images to GPU memory for fast training. This depends on GPU size and number of images.
    preload_images: False
    limit_batches: 1.0
    # If true, opens only the first image to get dimensions for coordinate validation.
    # Assumes all images are the same size.
    same_size_images: false


validation:
    csv_file:
    root_dir:
    preload_images: False
    size:
    same_size_images: false

    # For retinanet you may prefer val_classification, but the default val_loss
    # should work with all models
    lr_plateau_target: val_loss

    # Intersection over union evaluation
    iou_threshold: 0.4
    # Distance threshold (pixels) for keypoint recall/precision matching
    distance_threshold: 10.0
    val_accuracy_interval: 20

    limit_batches: 1.0

    # Data augmentation is none by default for validation, but you can specify:
    # augmentations:
    # if you need to apply augmentations during the val stage.

predict:
    pin_memory: False

cropmodel:
    architecture: resnet50
    batch_size: 4
    num_workers: 0
    lr: 0.0001
    scheduler:
        type: ReduceLROnPlateau
        params:
            mode: min
            factor: 0.5
            patience: 5
            threshold: 0.0001
            threshold_mode: rel
            cooldown: 0
            min_lr: 0
            eps: 1.0e-08
    balance_classes: False
    resize:
        - 224
        - 224
    # Interpolation mode for resizing crops: 'nearest' or 'bilinear'.
    resize_interpolation: bilinear
    # Image normalization. Defaults to ImageNet stats when null.
    # Set to false to disable, or provide custom mean/std:
    #   normalize:
    #       mean: [0.5, 0.5, 0.5]
    #       std: [0.5, 0.5, 0.5]
    normalize:
    # Number of pixels to expand bbox crop windows for better prediction context.
    expand: 0

# These parameters are applied to keypoint detection models.
# Currently we offer a density prediction model.
keypoint:
    # Density sigma is annealed during training to
    # help tighten predictions as the model learns
    density_sigma_start: 4.0
    density_sigma_end: 2.0
    # MAE/count weight; set to 1/mean_count to normalise the count loss to
    # the same scale as other losses. Use dataset.mean_count() to compute.
    mae_weight: 0.025
    count_cls_weight: 0.025
    # Radius to integrate to compute "score" for peak
    # extraction, i.e. approximate crown radius.
    score_integration_radius: 5
    # Number of epochs over which density_sigma anneals.
    # Defaults to train.epochs; set lower (e.g. 50) so the full
    # sigma curriculum completes before early stopping kicks in.
    density_sigma_schedule_epochs: ~
    # Active loss terms. null enables all: count, ot, density_l1, count_cls.
    losses: ~
    # Normalize OT coordinates to [-1, 1] for global optimal transport.
    # Default false matches the reference TreeFormer (local OT only).
    norm_cood: false
