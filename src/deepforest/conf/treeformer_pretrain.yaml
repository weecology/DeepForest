defaults:
  - treeformer_hpg
  - _self_

train:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_train.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images
    same_size_images: true

    augmentations:
      - HorizontalFlip:
          p: 0.5
      - VerticalFlip:
          p: 0.5
      - Rotate:
          degrees: 180
          p: 0.5
      - RandomBrightnessContrast:
          brightness: 0.2
          contrast: 0.2
          p: 0.5
      - RandomCrop:
          size: [512, 512]
          p: 1.0


validation:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_test.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images
    same_size_images: true
    distance_threshold: 13.0

keypoint:
  density_sigma_start: 20.0
  density_sigma_end: 4.0
  mae_weight: 0.008
  count_cls_weight: 0.008
  ot_weight: 0.4
  score_integration_radius: 13
  density_sigma_schedule_epochs: 10
  losses: ~
  norm_cood: false
