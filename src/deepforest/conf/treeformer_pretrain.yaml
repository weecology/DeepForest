defaults:
  - treeformer_hpg
  - _self_

train:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_train.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images
    same_size_images: true
    epochs: 25
    scheduler:
        params:
            T_max: 25

    augmentations:
      - HorizontalFlip:
          p: 0.5
      - VerticalFlip:
          p: 0.5
      - Rotate:
          degrees: 180
          p: 0.5
      - RandomBrightnessContrast:
          brightness: 0.2
          contrast: 0.2
          p: 0.5

# Mimic training on Neon Eval - do the same for val if enabled.
# - RandomCrop:
#   p: 1
#   size: [512, 512]

validation:
    csv_file: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_test.csv
    root_dir: /home/veitchmichaelisj/code/DeepForest_jvm/data/neon_images
    same_size_images: true
    distance_threshold: 13.0

keypoint:
  density_sigma_start: 7.0
  density_sigma_end: 3.0
  mae_weight: 0.025
  count_cls_weight: 0.025
  ot_weight: 0.4
  score_integration_radius: 13
  # After schedule is complete, sigma will flatline
  density_sigma_schedule_epochs: 15
  losses: ~
  norm_cood: false
