repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.(svg|yml|csv|xml|cpg|prj)$'
      - id: end-of-file-fixer
        exclude: '\.(svg|csv|xml|cpg|prj)$'
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
        files: citation_count.json

  # Notebooks: run Ruff via nbQA inside .ipynb
  # language_version pin avoids ast.Str removal issue on Python 3.14
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.0
    hooks:
      - id: nbqa-ruff-format
        additional_dependencies: [ruff]
        language_version: python3.12
        files: ^docs/user_guide/examples/.*\.ipynb$
      - id: nbqa-ruff
        args: ["--fix"]
        additional_dependencies: [ruff]
        language_version: python3.12
        files: ^docs/user_guide/examples/.*\.ipynb$

  # Docstrings: auto-format
  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        additional_dependencies: [tomli]
        language_version: python3.12
        args: ["--in-place"]
        files: |
          (?x)^(
            src/deepforest.*\.py|
            fetch_google_scholar\.py
          )$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-format
        files: |
          (?x)^(
            src/deepforest.*\.py|
            fetch_google_scholar\.py
          )$
      - id: ruff
        args: ["--fix"]
        files: |
          (?x)^(
            src/deepforest.*\.py|
            fetch_google_scholar\.py
          )$
ci:
    autofix_prs: false
    autoupdate_schedule: quarterly
